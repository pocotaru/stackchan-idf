<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stack-chan 設定</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f5f5f5;
    color: #222;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    padding: 2rem;
    width: 100%;
    max-width: 480px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    background: #f0f0f0;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #bbb;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.ble-connected  { background: #4caf50; }
  .dot.wifi-connected { background: #2196f3; }
  .dot.ble-connecting { background: #ff9800; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .flags {
    margin-left: auto;
    display: flex;
    gap: 0.3rem;
  }
  .flag {
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    background: #e0e0e0;
    color: #555;
  }
  .flag.set { background: #c8e6c9; color: #2e7d32; }
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    margin-top: 1rem;
  }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 0.5rem 0.75rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #2196f3; }
  .hint { font-size: 0.78rem; color: #888; margin-top: 0.2rem; }
  .actions { margin-top: 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
  button {
    padding: 0.55rem 1.2rem;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s, background 0.2s;
  }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  #btn-connect  { background: #1976d2; color: white; }
  #btn-apply    { background: #388e3c; color: white; }
  #btn-disconnect { background: #e0e0e0; color: #333; }
  .log {
    margin-top: 1.5rem;
    background: #1e1e1e;
    color: #d4d4d4;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-family: monospace;
    font-size: 0.8rem;
    max-height: 180px;
    overflow-y: auto;
  }
  .log .entry { line-height: 1.5; }
  .log .ts { color: #888; margin-right: 0.4rem; }
  .log .ok  { color: #89d185; }
  .log .err { color: #f48771; }
  .log .info{ color: #9cdcfe; }
  .compat-note {
    margin-top: 1.25rem;
    font-size: 0.78rem;
    color: #999;
    border-top: 1px solid #eee;
    padding-top: 0.75rem;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🤖 Stack-chan 設定</h1>
  <p class="subtitle">Web Bluetooth 経由で Wi-Fi と API キーを設定します</p>

  <div class="status-bar">
    <span class="dot" id="ble-dot"></span>
    <span id="ble-label">未接続</span>
    <span class="dot" id="wifi-dot" style="margin-left:0.75rem"></span>
    <span id="wifi-label">Wi-Fi: —</span>
    <span class="flags">
      <span class="flag" id="flag-ssid" title="SSID 設定済み">S</span>
      <span class="flag" id="flag-pass" title="Password 設定済み">P</span>
      <span class="flag" id="flag-key"  title="API key 設定済み">K</span>
    </span>
  </div>

  <label for="ssid">Wi-Fi SSID</label>
  <input type="text" id="ssid" maxlength="32" placeholder="MyNetwork">
  <p class="hint">空欄のままにすると現在の値を変更しません</p>

  <label for="password">Wi-Fi パスワード</label>
  <input type="password" id="password" maxlength="64" placeholder="（変更しない場合は空欄）">

  <label for="apikey">OpenAI API キー</label>
  <input type="password" id="apikey" maxlength="256" placeholder="sk-… （変更しない場合は空欄）">

  <div class="actions">
    <button id="btn-connect">BLE 接続</button>
    <button id="btn-apply" disabled>保存 &amp; 再起動</button>
    <button id="btn-disconnect" disabled>切断</button>
  </div>

  <div class="log" id="log"></div>

  <p class="compat-note">
    Chrome / Edge (デスクトップ) <strong>133 以降</strong> + <code>file://</code> で動作します。
    Firefox・Safari は Web Bluetooth 非対応です。<br>
    通信は接続ごとに X25519 + AES-256-GCM で暗号化されます（OS ペアリング不要）。
  </p>
</div>

<script>
// --- UUIDs ---
const SVC_UUID    = 'e3f0a000-7b1c-4d2a-9e6f-2c5a8d4b1f00';
const CHR_SSID    = 'e3f0a001-7b1c-4d2a-9e6f-2c5a8d4b1f00';
const CHR_PASS    = 'e3f0a002-7b1c-4d2a-9e6f-2c5a8d4b1f00';
const CHR_KEY     = 'e3f0a003-7b1c-4d2a-9e6f-2c5a8d4b1f00';
const CHR_APPLY   = 'e3f0a004-7b1c-4d2a-9e6f-2c5a8d4b1f00';
const CHR_STATUS  = 'e3f0a005-7b1c-4d2a-9e6f-2c5a8d4b1f00';
const CHR_KX      = 'e3f0a006-7b1c-4d2a-9e6f-2c5a8d4b1f00';

// --- State ---
let bleDevice = null, bleServer = null, svc = null;
let chrSsid = null, chrPass = null, chrKey = null, chrApply = null, chrStatus = null, chrKx = null;
let aesKey = null;  // CryptoKey for AES-256-GCM, derived per connection

// --- Log ---
const logEl = document.getElementById('log');
function log(msg, cls = 'info') {
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML = `<span class="ts">[${ts}]</span><span class="${cls}">${msg}</span>`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

// --- UI helpers ---
function setBleUi(connected) {
  const dot = document.getElementById('ble-dot');
  dot.className = 'dot ' + (connected ? 'ble-connected' : '');
  document.getElementById('ble-label').textContent = connected ? 'BLE 接続中' : '未接続';
  document.getElementById('btn-apply').disabled = !connected;
  document.getElementById('btn-disconnect').disabled = !connected;
  document.getElementById('btn-connect').disabled = connected;
}

function updateStatus(data) {
  const flags = data.getUint8(0);
  const wifi  = data.getUint8(1);
  document.getElementById('flag-ssid').classList.toggle('set', !!(flags & 0x01));
  document.getElementById('flag-pass').classList.toggle('set', !!(flags & 0x02));
  document.getElementById('flag-key' ).classList.toggle('set', !!(flags & 0x04));
  const wifiDot = document.getElementById('wifi-dot');
  wifiDot.className = 'dot ' + (wifi ? 'wifi-connected' : '');
  document.getElementById('wifi-label').textContent = wifi ? 'Wi-Fi: 接続中' : 'Wi-Fi: 切断中';
}

// --- Encode helpers ---
const enc = new TextEncoder();
const dec = new TextDecoder();

function strToBytes(s) { return enc.encode(s); }

// --- Crypto helpers (X25519 ECDH → HKDF-SHA256 → AES-256-GCM) ---

// Probe browser X25519 support. Chrome / Edge 133+ shipped it GA; older
// versions fail at generateKey.
async function ensureX25519Supported() {
  try {
    await crypto.subtle.generateKey({ name: 'X25519' }, false, ['deriveBits']);
  } catch (e) {
    throw new Error('X25519 非対応のブラウザです (Chrome / Edge 133 以降が必要)');
  }
}

// Run the application-layer handshake against the device:
//   1. Read device's 32-byte ephemeral pubkey from KeyExchange (plaintext).
//   2. Generate our own X25519 keypair.
//   3. ECDH → 32-byte shared secret → HKDF-SHA256 → AES-256 key.
//   4. Write our pubkey to KeyExchange to commit the device side.
// On success `aesKey` is a non-extractable CryptoKey usable for AES-GCM.
async function setupSession() {
  const devicePubRaw = new Uint8Array((await chrKx.readValue()).buffer);
  if (devicePubRaw.length !== 32) {
    throw new Error(`device pubkey length ${devicePubRaw.length} != 32`);
  }
  const ourKp = await crypto.subtle.generateKey({ name: 'X25519' }, false, ['deriveBits']);
  const devicePub = await crypto.subtle.importKey('raw', devicePubRaw, { name: 'X25519' }, false, []);
  const sharedBits = await crypto.subtle.deriveBits(
    { name: 'X25519', public: devicePub }, ourKp.privateKey, 256);
  const ikm = await crypto.subtle.importKey(
    'raw', sharedBits, { name: 'HKDF' }, false, ['deriveKey']);
  aesKey = await crypto.subtle.deriveKey(
    {
      name: 'HKDF',
      hash: 'SHA-256',
      salt: new Uint8Array(0),
      info: enc.encode('stackchan-config-v1'),
    },
    ikm,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']);
  const ourPubRaw = new Uint8Array(await crypto.subtle.exportKey('raw', ourKp.publicKey));
  await chrKx.writeValueWithResponse(ourPubRaw);
}

// Decrypt a characteristic READ. Wire format: [12B nonce][ct][16B tag].
async function readEncrypted(chr) {
  const wire = new Uint8Array((await chr.readValue()).buffer);
  if (wire.length < 12 + 16) throw new Error('encrypted read too short');
  const iv = wire.subarray(0, 12);
  const ctTag = wire.subarray(12);
  const ptBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, ctTag);
  return new Uint8Array(ptBuf);
}

// Encrypt a payload and write it. Same wire format.
async function writeEncrypted(chr, plainBytes) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ctTag = new Uint8Array(
    await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, aesKey, plainBytes));
  const wire = new Uint8Array(iv.length + ctTag.length);
  wire.set(iv, 0);
  wire.set(ctTag, iv.length);
  await chr.writeValueWithResponse(wire);
}

// --- Connect ---
document.getElementById('btn-connect').addEventListener('click', async () => {
  if (!navigator.bluetooth) {
    log('Web Bluetooth が使えません。Chrome / Edge デスクトップで開いてください。', 'err');
    return;
  }
  try {
    await ensureX25519Supported();
  } catch (e) {
    log(e.message, 'err');
    return;
  }
  document.getElementById('ble-dot').className = 'dot ble-connecting';
  document.getElementById('ble-label').textContent = '接続中…';
  document.getElementById('btn-connect').disabled = true;

  try {
    log('デバイスを検索中…');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SVC_UUID] }],
      optionalServices: [SVC_UUID],
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    log(`デバイス: ${bleDevice.name || '(名称不明)'}`);
    bleServer = await bleDevice.gatt.connect();
    log('GATT 接続完了', 'ok');

    svc = await bleServer.getPrimaryService(SVC_UUID);
    [chrSsid, chrPass, chrKey, chrApply, chrStatus, chrKx] = await Promise.all([
      svc.getCharacteristic(CHR_SSID),
      svc.getCharacteristic(CHR_PASS),
      svc.getCharacteristic(CHR_KEY),
      svc.getCharacteristic(CHR_APPLY),
      svc.getCharacteristic(CHR_STATUS),
      svc.getCharacteristic(CHR_KX),
    ]);
    log('Characteristics 取得完了', 'ok');

    // X25519 handshake. After this, every other read/write is encrypted.
    await setupSession();
    log('鍵交換完了 (X25519 + AES-256-GCM)', 'ok');

    try {
      const ssidBytes = await readEncrypted(chrSsid);
      const ssidStr = dec.decode(ssidBytes);
      if (ssidStr) {
        document.getElementById('ssid').placeholder = ssidStr + ' (現在の値)';
        log(`現在の SSID: ${ssidStr}`);
      }
    } catch (e) {
      log(`SSID 読み取りエラー: ${e.message}`, 'err');
    }

    try {
      const stBytes = await readEncrypted(chrStatus);
      updateStatus(new DataView(stBytes.buffer, stBytes.byteOffset, stBytes.byteLength));
    } catch (e) {
      log(`Status 読み取りエラー: ${e.message}`, 'err');
    }

    // Subscribe to Status notifications — notify payloads are encrypted too.
    await chrStatus.startNotifications();
    chrStatus.addEventListener('characteristicvaluechanged', async e => {
      try {
        const wire = new Uint8Array(e.target.value.buffer);
        if (wire.length < 12 + 16) return;
        const iv = wire.subarray(0, 12);
        const ctTag = wire.subarray(12);
        const pt = new Uint8Array(
          await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, ctTag));
        updateStatus(new DataView(pt.buffer, pt.byteOffset, pt.byteLength));
      } catch (err) {
        log(`Status 通知の復号エラー: ${err.message}`, 'err');
      }
    });
    log('Status 通知を登録しました', 'ok');

    setBleUi(true);
  } catch (e) {
    log(`接続失敗: ${e.message}`, 'err');
    setBleUi(false);
    document.getElementById('ble-dot').className = 'dot';
    document.getElementById('ble-label').textContent = '未接続';
    document.getElementById('btn-connect').disabled = false;
  }
});

// --- Disconnect handler ---
function onDisconnected() {
  log('切断されました', 'err');
  setBleUi(false);
  chrSsid = chrPass = chrKey = chrApply = chrStatus = chrKx = null;
  aesKey = null;
}

// --- Manual disconnect ---
document.getElementById('btn-disconnect').addEventListener('click', () => {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
  }
});

// --- Apply ---
document.getElementById('btn-apply').addEventListener('click', async () => {
  const ssid = document.getElementById('ssid').value.trim();
  const pass = document.getElementById('password').value;
  const key  = document.getElementById('apikey').value.trim();

  const btn = document.getElementById('btn-apply');
  btn.disabled = true;
  btn.textContent = '保存中…';

  try {
    // Write only fields that have input (empty = unchanged). All payloads
    // travel through the AES-GCM session established at connect.
    if (ssid) {
      await writeEncrypted(chrSsid, strToBytes(ssid));
      log('SSID 書き込み完了', 'ok');
    }
    if (pass) {
      await writeEncrypted(chrPass, strToBytes(pass));
      log('パスワード 書き込み完了', 'ok');
    }
    if (key) {
      await writeEncrypted(chrKey, strToBytes(key));
      log('API キー 書き込み完了', 'ok');
    }

    log('Apply を送信しています…');
    // Sentinel: single byte 0x01, encrypted like everything else.
    await writeEncrypted(chrApply, new Uint8Array([0x01]));
    log('Apply 完了 — デバイスが再起動します', 'ok');
    btn.textContent = '再起動中…';
    // Device reboots ~200 ms after Apply; disconnection event will fire shortly.
  } catch (e) {
    // A disconnection during/after Apply is expected (device restarted).
    if (e.message && e.message.toLowerCase().includes('disconnect')) {
      log('適用しました — 再起動中…', 'ok');
      btn.textContent = '再起動中…';
    } else {
      log(`Apply エラー: ${e.message}`, 'err');
      btn.disabled = false;
      btn.textContent = '保存 & 再起動';
    }
  }
});
</script>
</body>
</html>
